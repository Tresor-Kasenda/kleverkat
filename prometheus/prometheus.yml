global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: mysql
    static_configs:
      - targets: ["mysqld-exporter:9104"]

  - job_name: app
    metrics_path: /metrics
    static_configs:
      - targets: ["app:80"]
