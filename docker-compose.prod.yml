# Production-like stack for kleverkat-web.
#
#   cp .env.docker.example .env        # then edit: APP_ENV=production, APP_DEBUG=false,
#                                      # strong DB_PASSWORD, real APP_URL, APP_KEY set
#   docker compose -f docker-compose.prod.yml up -d --build
#
# The app image is built once (target: prod) and reused by the queue & scheduler.

services:
  app:
    build:
      context: .
      target: prod
    image: kleverkat-web:latest
    env_file: .env
    environment:
      SERVER_NAME: ":80"        # set to a hostname to enable automatic HTTPS
      RUN_MIGRATIONS: "true"    # only the web container runs migrations
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Queue worker — reuses the image already built by `app`.
  queue:
    image: kleverkat-web:latest
    env_file: .env
    command: php artisan queue:work --tries=3 --max-time=3600 --timeout=90
    # Worker, not a web server → disable the image's HTTP healthcheck.
    healthcheck:
      disable: true
    restart: unless-stopped
    depends_on:
      - app
      - mysql
      - redis

  # Scheduler — runs Laravel's scheduled tasks in-container (no host cron needed).
  scheduler:
    image: kleverkat-web:latest
    env_file: .env
    command: php artisan schedule:work
    # Worker, not a web server → disable the image's HTTP healthcheck.
    healthcheck:
      disable: true
    restart: unless-stopped
    depends_on:
      - app
      - mysql
      - redis

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-kleverkat}"
      MYSQL_USER: "${DB_USERNAME:-kleverkat}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-secret}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  db-data:
  redis-data:
