; Production PHP configuration for kleverkat-web (loaded last → overrides defaults)
; See DOCKER.md › "Anatomie de l'image" for the reasoning behind each value.

[PHP]
memory_limit = 256M
upload_max_filesize = 20M
post_max_size = 25M
max_execution_time = 60
expose_php = Off

[opcache]
; OPcache is the single biggest "free" perf win for PHP in production.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; Code is immutable inside the image → no need to stat files on every request.
opcache.validate_timestamps = 0
; Just-In-Time compilation (tracing) for extra throughput.
opcache.jit = tracing
opcache.jit_buffer_size = 64M
