; Development PHP configuration for kleverkat-web (loaded last → overrides defaults)
; Goal: fast feedback and verbose errors, not raw performance.

[PHP]
memory_limit = 512M
upload_max_filesize = 50M
post_max_size = 55M
max_execution_time = 120
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

[opcache]
; Disabled in dev so code changes are picked up immediately (no stale bytecode).
opcache.enable = 0
opcache.enable_cli = 0
